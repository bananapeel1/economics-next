<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" role="img" aria-labelledby="title desc">
  <title id="title">Supply and Demand Equilibrium</title>
  <desc id="desc">Price on vertical axis, quantity on horizontal axis. Downward-sloping demand curve D intersects upward-sloping supply curve S at equilibrium point (P*, Q*). Dashed lines project the equilibrium to both axes.</desc>
  <style>
    .axis { stroke: #64748b; stroke-width: 1.5; fill: none; }
    .tick { stroke: #94a3b8; stroke-width: 1; }
    .text { font-family: ui-sans-serif, system-ui, sans-serif; fill: #1f2937; }
    .axis-title { font-size: 14px; font-weight: 600; }
    .label { font-size: 14px; font-weight: 600; }
    .note { font-size: 12px; fill: #475569; }
    .d-curve { fill: none; stroke: #4f46e5; stroke-width: 2.5; }
    .s-curve { fill: none; stroke: #ef4444; stroke-width: 2.5; }
    .dashed { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4 4; fill: none; }
    .dot { fill: #111827; }
  </style>

  <line class="axis" x1="70" y1="50" x2="70" y2="350" />
  <line class="axis" x1="70" y1="350" x2="470" y2="350" />

  <text class="text axis-title" x="50" y="45" text-anchor="start">Price (P)</text>
  <text class="text axis-title" x="465" y="375" text-anchor="end">Quantity (Q)</text>
  <text class="text note" x="62" y="360" text-anchor="end">0</text>

  <line class="d-curve" x1="100" y1="80" x2="440" y2="320" />
  <line class="s-curve" x1="100" y1="320" x2="440" y2="80" />

  <circle class="dot" cx="270" cy="200" r="4.5" />

  <line class="dashed" x1="70" y1="200" x2="270" y2="200" />
  <line class="dashed" x1="270" y1="350" x2="270" y2="200" />

  <text class="text label" x="62" y="204" text-anchor="end" fill="#111827">P*</text>
  <text class="text label" x="270" y="368" text-anchor="middle" fill="#111827">Q*</text>

  <text class="text label d-label" x="447" y="320" fill="#4f46e5">D</text>
  <text class="text label s-label" x="447" y="80" fill="#ef4444">S</text>

  <text class="text note" x="285" y="194">Equilibrium</text>

  <text class="text note" x="250" y="390" text-anchor="middle">At P*, quantity demanded = quantity supplied.</text>
</svg>
