<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" role="img" aria-labelledby="title desc">
  <title id="title">Pigouvian indirect tax to correct a negative externality</title>
  <desc id="desc">A per-unit Pigouvian tax equal to the external marginal cost shifts supply from S to S + tax. The new equilibrium falls from (P1, Q1) to (P2, Q*), where Q* is the socially optimal quantity. Consumers pay P2; producers receive P2 minus tax. The shaded rectangle is government tax revenue.</desc>
  <style>
    .axis { stroke: #64748b; stroke-width: 1.5; fill: none; }
    .text { font-family: ui-sans-serif, system-ui, sans-serif; fill: #1f2937; }
    .axis-title { font-size: 14px; font-weight: 600; }
    .label { font-size: 13px; font-weight: 600; }
    .note { font-size: 12px; fill: #475569; }
    .s { fill: none; stroke: #ef4444; stroke-width: 2.5; }
    .s-tax { fill: none; stroke: #10b981; stroke-width: 2.5; }
    .d { fill: none; stroke: #4f46e5; stroke-width: 2.5; }
    .dashed { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4 4; fill: none; }
    .revenue { fill: #f59e0b; fill-opacity: 0.35; stroke: #d97706; stroke-width: 1; }
    .dot { fill: #111827; }
  </style>

  <line class="axis" x1="70" y1="50" x2="70" y2="350" />
  <line class="axis" x1="70" y1="350" x2="470" y2="350" />
  <text class="text axis-title" x="42" y="45">Price (P)</text>
  <text class="text axis-title" x="465" y="375" text-anchor="end">Quantity (Q)</text>

  <line class="s" x1="100" y1="320" x2="440" y2="80" />
  <line class="s-tax" x1="100" y1="270" x2="440" y2="30" />
  <line class="d" x1="100" y1="80" x2="440" y2="320" />

  <rect class="revenue" x="70" y="140" width="180" height="60" />

  <circle class="dot" cx="270" cy="200" r="4" />
  <circle class="dot" cx="250" cy="140" r="4" />

  <line class="dashed" x1="70" y1="200" x2="270" y2="200" />
  <line class="dashed" x1="270" y1="350" x2="270" y2="200" />
  <line class="dashed" x1="70" y1="140" x2="250" y2="140" />
  <line class="dashed" x1="250" y1="350" x2="250" y2="140" />

  <text class="text label" x="62" y="204" text-anchor="end">P1</text>
  <text class="text label" x="62" y="144" text-anchor="end">P2</text>
  <text class="text label" x="270" y="368" text-anchor="middle">Q1</text>
  <text class="text label" x="250" y="368" text-anchor="middle" dy="14">Q*</text>

  <text class="text label" x="446" y="80" fill="#ef4444">S</text>
  <text class="text label" x="446" y="30" fill="#10b981">S + tax</text>
  <text class="text label" x="446" y="320" fill="#4f46e5">D</text>

  <text class="text note" x="160" y="175" text-anchor="middle">Tax revenue</text>

  <text class="text note" x="250" y="390" text-anchor="middle">Per-unit tax = external cost; new equilibrium at socially optimal Q*.</text>
</svg>
