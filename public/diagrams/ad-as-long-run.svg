<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" role="img" aria-labelledby="title desc">
  <title id="title">Long-run aggregate supply and full-employment output</title>
  <desc id="desc">LRAS is vertical at full-employment real GDP Yf. AD and SRAS meet at short-run equilibrium; in the long run output returns to Yf as wages and prices adjust.</desc>
  <style>
    .axis { stroke: #64748b; stroke-width: 1.5; fill: none; }
    .text { font-family: ui-sans-serif, system-ui, sans-serif; fill: #1f2937; }
    .axis-title { font-size: 14px; font-weight: 600; }
    .label { font-size: 14px; font-weight: 600; }
    .note { font-size: 12px; fill: #475569; }
    .ad { fill: none; stroke: #4f46e5; stroke-width: 2.5; }
    .sras { fill: none; stroke: #ef4444; stroke-width: 2.5; }
    .lras { fill: none; stroke: #10b981; stroke-width: 2.5; }
    .dashed { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4 4; fill: none; }
    .dot { fill: #111827; }
  </style>

  <line class="axis" x1="70" y1="50" x2="70" y2="350" />
  <line class="axis" x1="70" y1="350" x2="470" y2="350" />
  <text class="text axis-title" x="42" y="45">Price level (PL)</text>
  <text class="text axis-title" x="465" y="375" text-anchor="end">Real GDP (Y)</text>

  <line class="lras" x1="290" y1="60" x2="290" y2="350" />

  <line class="ad" x1="100" y1="100" x2="440" y2="330" />

  <path class="sras" d="M 100 330 Q 220 260 440 90" />

  <circle class="dot" cx="290" cy="220" r="4.5" />

  <line class="dashed" x1="70" y1="220" x2="290" y2="220" />
  <line class="dashed" x1="290" y1="350" x2="290" y2="60" stroke-dasharray="0" stroke="none" />

  <text class="text label" x="62" y="224" text-anchor="end">PL*</text>
  <text class="text label" x="290" y="368" text-anchor="middle">Yf</text>

  <text class="text label" x="445" y="330" fill="#4f46e5">AD</text>
  <text class="text label" x="445" y="90" fill="#ef4444">SRAS</text>
  <text class="text label" x="296" y="58" fill="#10b981">LRAS</text>

  <text class="text note" x="250" y="390" text-anchor="middle">In the long run, output returns to Yf — the economy's productive capacity.</text>
</svg>
