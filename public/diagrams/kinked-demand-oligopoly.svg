<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" role="img" aria-labelledby="title desc">
  <title id="title">Kinked demand curve under oligopoly</title>
  <desc id="desc">Oligopolists face a kinked demand curve: above the prevailing price, demand is relatively elastic (rivals do not follow a price rise); below, it is relatively inelastic (rivals match a price cut). The marginal revenue curve has a vertical gap at the kink, so small shifts in marginal cost within that gap leave the profit-maximising price unchanged.</desc>
  <style>
    .axis { stroke: #64748b; stroke-width: 1.5; fill: none; }
    .text { font-family: ui-sans-serif, system-ui, sans-serif; fill: #1f2937; }
    .axis-title { font-size: 14px; font-weight: 600; }
    .label { font-size: 13px; font-weight: 600; }
    .note { font-size: 12px; fill: #475569; }
    .d { fill: none; stroke: #4f46e5; stroke-width: 2.5; }
    .mr { fill: none; stroke: #6366f1; stroke-width: 2.5; stroke-dasharray: 4 3; }
    .mc { fill: none; stroke: #ef4444; stroke-width: 2.5; }
    .mc2 { fill: none; stroke: #ef4444; stroke-width: 2.5; stroke-dasharray: 4 3; }
    .dashed { stroke: #94a3b8; stroke-width: 1; stroke-dasharray: 4 4; fill: none; }
    .dot { fill: #111827; }
  </style>

  <line class="axis" x1="70" y1="50" x2="70" y2="350" />
  <line class="axis" x1="70" y1="350" x2="470" y2="350" />
  <text class="text axis-title" x="42" y="45">Price, Cost</text>
  <text class="text axis-title" x="465" y="375" text-anchor="end">Quantity (Q)</text>

  <line class="d" x1="100" y1="90" x2="260" y2="200" />
  <line class="d" x1="260" y1="200" x2="440" y2="330" />

  <line class="mr" x1="100" y1="90" x2="260" y2="260" />
  <line class="mr" x1="260" y1="320" x2="420" y2="340" />

  <line class="dashed" x1="260" y1="260" x2="260" y2="320" />

  <path class="mc" d="M 110 310 C 180 260, 220 240, 400 170" />
  <path class="mc2" d="M 110 340 C 180 300, 220 280, 400 200" />

  <circle class="dot" cx="260" cy="200" r="4.5" />

  <line class="dashed" x1="70" y1="200" x2="260" y2="200" />
  <line class="dashed" x1="260" y1="350" x2="260" y2="200" />

  <text class="text label" x="62" y="204" text-anchor="end">P*</text>
  <text class="text label" x="260" y="368" text-anchor="middle">Q*</text>

  <text class="text label" x="445" y="330" fill="#4f46e5">D</text>
  <text class="text label" x="425" y="340" fill="#6366f1">MR</text>
  <text class="text label" x="405" y="170" fill="#ef4444">MC</text>
  <text class="text label" x="405" y="200" fill="#ef4444">MC'</text>

  <text class="text note" x="170" y="120" text-anchor="start">Elastic region</text>
  <text class="text note" x="170" y="135" text-anchor="start">(rivals don't follow up)</text>
  <text class="text note" x="345" y="280" text-anchor="start">Inelastic region</text>
  <text class="text note" x="345" y="295" text-anchor="start">(rivals follow down)</text>

  <text class="text note" x="250" y="390" text-anchor="middle">Price rigidity: MC can shift between MC and MC' without changing P*.</text>
</svg>
